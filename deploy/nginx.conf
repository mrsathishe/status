# nginx site for the status dashboard.
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/status
#   sudo ln -s /etc/nginx/sites-available/status /etc/nginx/sites-enabled/status
#   sudo nginx -t && sudo systemctl reload nginx
# Then add HTTPS:
#   sudo certbot --nginx -d status.satz.co.in

server {
    listen 80;
    server_name status.satz.co.in;

    # Static frontend served directly by nginx.
    root /var/www/status;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests are reverse-proxied to the Node backend on localhost.
    # No trailing slash on proxy_pass -> the /api/ prefix is preserved.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
