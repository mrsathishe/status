<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server status (satz.co.in)</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Login view -->
    <section id="login-view" class="container hidden">
      <form id="login-form" class="card login">
        <h1>Sign in</h1>
        <label>
          Username
          <input type="text" id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Log in</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </section>

    <!-- Dashboard view -->
    <section id="dashboard-view" class="container hidden">
      <header class="dashboard-header">
        <div>
          <h1>Server status <span class="domain">(&nbsp;satz.co.in&nbsp;)</span></h1>
          <p class="provider">Server hosted by hostitmart</p>
        </div>
        <button id="logout-btn" class="logout">Log out</button>
      </header>

      <div id="clock" class="clock">
        <span class="clock__date" id="clock-date">—</span>
        <span class="clock__day" id="clock-day">—</span>
        <span class="clock__time" id="clock-time">—</span>
      </div>

      <h2 class="section-title">Active servers</h2>
      <table class="servers">
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr data-service="mongodb">
            <td>mongodb</td>
            <td><span class="badge badge--pending" id="mongodb-status">checking…</span></td>
          </tr>
        </tbody>
      </table>
    </section>

    <script src="js/app.js"></script>
  </body>
</html>
